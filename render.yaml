databases:
  - name: jqcc-postgres
    plan: starter

services:
  - type: web
    name: jqcc-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: jqcc-postgres
          property: connectionString
      - key: JIRA_BASE_URL
        sync: false
      - key: JIRA_EMAIL
        sync: false
      - key: JIRA_API_TOKEN
        sync: false
      - key: JIRA_PROJECT_KEY
        sync: false
      - key: JIRA_WEBHOOK_ENABLED
        value: "false"
      - key: JIRA_WEBHOOK_SECRET
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_MINUTES
        value: "120"
      - key: AUTH_COOKIE_NAME
        value: jqcc_access_token
      - key: AUTH_COOKIE_SECURE
        value: "true"
      - key: AUTH_COOKIE_SAMESITE
        value: none
      - key: ADMIN_BOOTSTRAP_USER
        value: admin
      - key: ADMIN_BOOTSTRAP_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: TRUSTED_HOSTS
        sync: false
      - key: SECURITY_HEADERS_ENABLED
        value: "true"
      - key: SCHEDULER_ENABLED
        value: "true"
      - key: SNAPSHOT_INTERVAL_MINUTES
        value: "10"
      - key: AGING_DAYS_THRESHOLD
        value: "5"
      - key: RATE_LIMIT_ENABLED
        value: "true"
      - key: RATE_LIMIT_PER_MINUTE
        value: "120"
      - key: LOG_LEVEL
        value: INFO

  - type: static
    name: jqcc-frontend
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
